name: confess_nepal
description: "Anonymous confession platform for Nepal"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  provider: ^6.1.2
  uuid: ^4.5.1
  shared_preferences: ^2.3.4
  intl: ^0.19.0
  http: ^1.2.2
  share_plus: ^10.1.4
  flutter_secure_storage: ^10.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/
  fonts:
    - family: NotoSansDevanagari
      fonts:
        - asset: assets/fonts/NotoSansDevanagari.ttf
